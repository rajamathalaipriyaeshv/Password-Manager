<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuantumVault // Encrypted Security Core</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

    <div id="toast-container"></div>

    <!-- Interface Auth Container Frame -->
    <div id="auth-view" class="auth-container">
        <div class="glass auth-box">
            <h1 class="logo">🛡️ QuantumVault</h1>
            <p class="text-muted mb-4" id="auth-subtitle">Sign in to your encrypted vault</p>
            
            <form id="auth-form">
                <input type="email" id="auth-email" placeholder="System Operator Email" required class="input-field mb-2">
                <input type="password" id="auth-password" placeholder="Master Key Phrase" required minlength="12" class="input-field mb-4">
                <button type="submit" class="btn btn-primary w-full" id="auth-submit-btn">Unlock Vault</button>
            </form>
            
            <div class="mt-3 text-center text-sm text-muted" style="margin-top:1.5rem;">
                <span id="auth-toggle-text">New operator?</span> 
                <span id="auth-toggle-btn" style="color:var(--neon-blue); font-weight:600;" class="cursor-pointer">Initialize Vault</span>
            </div>
        </div>
    </div>

    <!-- Application Secured Workplace Dashboard View Area -->
    <div id="app-dashboard-view" class="app-wrapper hidden">
        <aside class="sidebar">
            <div class="logo" style="padding-left:0.75rem;">🛡️ QuantumVault</div>
            
            <nav class="category-nav" id="category-menu">
                <div class="cat-item active" data-cat="all"><span>🗂️</span> All Items</div>
                <div class="cat-item" data-cat="Work"><span>💼</span> Work</div>
                <div class="cat-item" data-cat="Social"><span>🌐</span> Social</div>
                <div class="cat-item" data-cat="Banking"><span>💳</span> Banking</div>
                <div class="cat-item" data-cat="Other"><span>📁</span> Other</div>
            </nav>

            <div style="margin-top:auto; padding:0 0.5rem;">
                <div class="text-xs text-muted mb-2">Authenticated User</div>
                <div class="text-sm" id="user-display" style="font-weight:600; word-break:break-all; margin-bottom:1rem;"></div>
                <button class="btn btn-secondary w-full" id="logout-btn" style="font-size:0.8rem; padding:0.6rem;">Lock Session</button>
            </div>
        </aside>

        <main class="main-stage">
            <header class="navbar-minimal">
                <div>
                    <h2 style="font-weight:700; font-size:1.4rem;">Vault Dashboard</h2>
                    <p class="text-xs text-muted">Military-grade locally derived isolated session blocks</p>
                </div>
                <button class="btn btn-primary" id="open-modal-btn">+ Store Credential</button>
            </header>

            <section class="toolbar-layout">
                <input type="text" id="search-bar" placeholder="🔍 Search across encrypted memory arrays..." class="input-field glass">
            </section>

            <section class="vault-grid" id="vault-entries">
                <!-- Javascript populates data records inside fragment target blocks dynamically -->
            </section>
        </main>
    </div>

    <!-- Creation Entry Dialog Form Modal Overlay -->
    <div id="entry-modal" class="modal-backdrop hidden">
        <div class="modal-content glass">
            <h3 class="mb-4" style="font-size:1.3rem; font-weight:700;">Protect New Credential</h3>
            <form id="entry-form" style="display:flex; flex-direction:column; gap:1rem;">
                <input type="text" id="entry-name" placeholder="Target Identifier Name (e.g., AWS Developer Portal)" required class="input-field">
                <input type="text" id="entry-url" placeholder="Network Target Base URL" class="input-field">
                <input type="text" id="entry-user" placeholder="User Alias / Identity Email" class="input-field">
                
                <div>
                    <div style="display:flex; gap:0.5rem; margin-bottom:0.5rem;">
                        <input type="password" id="entry-pass" placeholder="Secret Key Value String" required class="input-field">
                        <button type="button" class="btn btn-secondary" id="gen-pass-btn" style="padding:0 1rem;" title="Generate Strong Key">⚡</button>
                    </div>
                </div>

                <div class="select-wrapper">
                    <select id="entry-cat" class="input-field select-field">
                        <option value="Work">Work Namespace Segment</option>
                        <option value="Social">Social Media Workspace</option>
                        <option value="Banking">Financial Asset Cluster</option>
                        <option value="Other" selected>Generic Segment (Other)</option>
                    </select>
                </div>

                <div style="display:flex; justify-content:flex-end; gap:0.75rem; margin-top:1rem;">
                    <button type="button" class="btn btn-secondary" id="close-modal-btn">Abort</button>
                    <button type="submit" class="btn btn-primary">Lock & Persist</button>
                </div>
            </form>
        </div>
    </div>

    <script src="/static/js/app.js"></script>
</body>
</html>
